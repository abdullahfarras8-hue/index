<!DOCTYPE html>
<html>
<head>
    <title>Belajar Membuat Form</title>
    <style>
        body {
            background-image: url('https://cdn.britannica.com/10/189510-050-7E6F86DD/lev-yashin-with-golden-ball-1964.jpg');
            background-size: 100%;
            font-family: sans-serif;
        }
        .kotak-login {
            background-color: white;
            width: 350px;
            padding: 30px;
            margin: 100px auto; /* Posisi di tengah */
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1); /* Efek bayangan estetik */
            text-align: center;
        }
        /* CSS KHUSUS UNTUK KOTAK INPUT */
        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        /* CSS KHUSUS UNTUK TOMBOL */
        button {
            width: 100%;
            padding: 12px;
            background-color: #0866ff; /* Warna biru tombol sosmed */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="kotak-login">
        <h2>hallo</h2>
        
        <form>
            <input type="text" placeholder="username">
            <input type="password" placeholder="Masukkan Kata Sandi">
            
            <button type="button">make account</button>
        </form>

    </div>

</body>
</html>
